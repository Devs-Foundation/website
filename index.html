  },
  retina_detect: true

// Typewriter rotator
var words = ['Eat', 'Sleep', 'Code', 'Repeat'];
var wordIdx = 0;
var charIdx = 0;
var isDeleting = false;
var el = document.getElementById('word');

function type() {
  var current = words[wordIdx];
  if (isDeleting) {
    el.textContent = current.substring(0, charIdx - 1);
    charIdx--;
  } else {
    el.textContent = current.substring(0, charIdx + 1);
    charIdx++;
  }

  if (!isDeleting && charIdx === current.length) {
    setTimeout(function() { isDeleting = true; type(); }, 2000);
    return;
  }
  if (isDeleting && charIdx === 0) {
    isDeleting = false;
    wordIdx = (wordIdx + 1) % words.length;
    setTimeout(type, 500);
    return;
  }
  setTimeout(type, isDeleting ? 80 : 120);
}
type();
</script>
